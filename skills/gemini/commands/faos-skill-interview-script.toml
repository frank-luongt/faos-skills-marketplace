2. [pain] — Severity: High/Medium/Low

### Desired Outcome
- [What "success" looks like to them]

### Willingness to Pay / Priority
- [Evidence of how much they care]

### Surprise Findings
- [Anything unexpected]

### Verbatim Quotes (Most Important)
- "[exact quote]"
- "[exact quote]"

### Follow-Up Actions
- [ ] [action]
